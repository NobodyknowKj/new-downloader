name: 🗑 Clean downloads folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE ALL files inside downloads/ folder. Click "Run workflow" only if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove downloads folder and recreate it
        run: |
          rm -rf downloads
          mkdir downloads

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add downloads
          git commit -m "Empty downloads folder [skip ci]" || echo "No changes"
          git push
